# ================================
# APPLICATION PROPERTIES
# ================================
spring.application.name=StudentConnect
server.port=${PORT:10000}

# ================================
# DATABASE (Supabase PostgreSQL)
# ================================
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:5}
spring.datasource.hikari.connection-timeout=20000
# Allow app to start even if DB is down (Prevents Render "Status 1" crash on cold start)
spring.datasource.hikari.initialization-fail-timeout=0

# ================================
# Flyway
# ================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true

# ================================
# JPA / Hibernate
# ================================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# JWT Configuration
# ================================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ================================
# CORS
# ================================
# Mapped to CORS_ALLOWED_ORIGINS environment variable
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://students-connect.vercel.app}

# ================================
# Frontend URL (OAuth redirect target)
# ================================
app.frontend.url=${FRONTEND_URL:https://students-connect.vercel.app}

# ================================
# Cloudinary
# ================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ================================
# Email (SendGrid)
# ================================
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:}

# ================================
# OpenAPI / Swagger
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# File Upload
# ================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# Logging
# ================================
logging.level.com.studentconnect=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.springframework.web.filter.CorsFilter=DEBUG
server.error.include-message=${ERROR_INCLUDE_MESSAGE:always}

# ================================
# Google OAuth
# ================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ================================
# Supabase
# ================================
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}

spring.config.import=optional:env:
logging.level.org.springframework.core.env=DEBUG


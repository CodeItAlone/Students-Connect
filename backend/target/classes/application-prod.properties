# ================================================
# PRODUCTION PROFILE - application-prod.properties
# ================================================
# Activate with: --spring.profiles.active=prod
# or env var: SPRING_PROFILES_ACTIVE=prod
# ================================================

# --- Database Safety ---
# NEVER use 'update' or 'create' in production normally.
# Use 'validate' and manage migrations with Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Security ---
# Do not expose internal error messages to clients
server.error.include-message=never
server.error.include-stacktrace=never

# --- Logging ---
# Reduce log verbosity in production
logging.level.com.studentconnect=INFO
logging.level.org.springframework.security=DEBUG

# --- Swagger ---
# Disable Swagger UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
